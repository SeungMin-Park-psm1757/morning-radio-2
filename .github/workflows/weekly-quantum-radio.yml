name: Weekly Quantum Morning Radio

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip Telegram delivery"
        required: false
        default: "false"
      skip_tts:
        description: "Skip TTS generation"
        required: false
        default: "false"
  schedule:
    # Monday 06:30 KST == Sunday 21:30 UTC
    - cron: "30 21 * * 0"

concurrency:
  group: weekly-quantum-radio
  cancel-in-progress: false

jobs:
  build-weekly-quantum-radio:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
      WEEKLY_QUANTUM_ENABLED: "true"
      WEEKLY_QUANTUM_TIMEZONE: Asia/Seoul
      WEEKLY_QUANTUM_OUTPUT_DIR: output/weekly_quantum
      WEEKLY_QUANTUM_ENABLE_TTS: ${{ github.event.inputs.skip_tts != 'true' }}
      WEEKLY_QUANTUM_ENABLE_TELEGRAM: ${{ github.event.inputs.dry_run != 'true' }}
      WEEKLY_QUANTUM_BUDGET_MODE: low

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run weekly quantum briefing
        run: |
          python -m morning_radio.weekly_quantum.cli

      - name: Publish run summary
        shell: bash
        run: |
          latest_dir="$(ls -1 output/weekly_quantum | sort | tail -n 1)"
          cat "output/weekly_quantum/${latest_dir}/summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload weekly output artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-quantum-radio-output
          path: output/weekly_quantum/
          if-no-files-found: error

      - name: Optional heartbeat
        if: ${{ success() && vars.WEEKLY_QUANTUM_HEARTBEAT_URL != '' }}
        run: |
          curl -fsS --retry 3 "${{ vars.WEEKLY_QUANTUM_HEARTBEAT_URL }}"
